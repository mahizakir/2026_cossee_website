name: Update ORCID publications

on:
  schedule:
    - cron: '23 9 * * *'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: update-orcid-publications
  cancel-in-progress: true

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          submodules: recursive

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Refresh ORCID publications data
        env:
          ORCID_ID: 0000-0002-7765-5182
          ORCID_ACCESS_TOKEN: ${{ secrets.ORCID_ACCESS_TOKEN }}
        run: python scripts/update_orcid_publications.py

      - name: Commit changes
        run: |
          if git diff --quiet -- data/orcid_publications.json; then
            echo "No publication updates to commit."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/orcid_publications.json
          git commit -m "Update ORCID publications archive"
          git push
