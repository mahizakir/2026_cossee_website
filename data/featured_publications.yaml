- title: "AmphiTherm: a comprehensive database of amphibian thermal tolerance and preference"
  authors: "Patrice Pottier, Rachel R. Y. Oh, Pietro Pollo, A. Nayelli Rivera-Villanueva, Yefeng Yang, and colleagues"
  journal: "Scientific Data"
  published: "November 21, 2025"
  citation: "Scientific Data 12, Article 1987"
  doi: "10.1038/s41597-025-06286-w"
  url: "https://www.nature.com/articles/s41597-025-06286-w"
  image: "https://media.springernature.com/lw685/springer-static/image/art%3A10.1038%2Fs41597-025-06286-w/MediaObjects/41597_2025_6286_Fig2_HTML.png"
  image_alt: "Geographic distribution map from the AmphiTherm paper"
  summary: "A reproducible amphibian thermal-trait database spanning 4,899 estimates across 659 species, expanding cold-tolerance and thermal-preference coverage while revealing major geographic gaps."

- title: "Reliability of meta-analyses in ecology and evolution: (mostly) good news from a case study on sexual signals"
  authors: "Pietro Pollo, Malgorzata Lagisz, Renato C. Macedo-Rego, Ayumi Mizuno, Yefeng Yang, and Shinichi Nakagawa"
  journal: "Proceedings of the Royal Society B"
  published: "May 21, 2025"
  citation: "Proc. R. Soc. B 292(2047): 20242782"
  doi: "10.1098/rspb.2024.2782"
  url: "https://doi.org/10.1098/rspb.2024.2782"
  image: "https://cdn.ncbi.nlm.nih.gov/pmc/blobs/bae3/12092126/505f1263b046/rspb.2024.2782.f001.jpg"
  image_alt: "Comparison figure from the reliability of meta-analyses paper"
  summary: "This paper re-analyses 41 meta-analyses on sexual signals and finds that, despite discrepancies, most published syntheses remain broadly reproducible and replicable."

- title: "Location-Scale Meta-Analysis and Meta-Regression as a Tool to Capture Large-Scale Changes in Biological and Methodological Heterogeneity: A Spotlight on Heteroscedasticity"
  authors: "Shinichi Nakagawa, Ayumi Mizuno, Kyle Morrison, Lorenzo Ricolfi, Coralie Williams, Szymon M. Drobniak, Malgorzata Lagisz, and Yefeng Yang"
  journal: "Global Change Biology"
  published: "May 2025"
  citation: "Global Change Biology 31(5): e70204"
  doi: "10.1111/gcb.70204"
  url: "https://doi.org/10.1111/gcb.70204"
  image: "https://cdn.ncbi.nlm.nih.gov/pmc/blobs/13ab/12047206/f235f925aa04/GCB-31-e70204-g004.jpg"
  image_alt: "Conceptual heteroscedasticity figure from the location-scale meta-analysis paper"
  summary: "A methodological paper introducing location-scale meta-analysis and meta-regression to model both mean effects and changing variance, making hidden heterogeneity easier to detect and interpret."

- title: "Vulnerability of amphibians to global warming"
  authors: "Patrice Pottier, Michael R. Kearney, Nicholas C. Wu, Alex R. Gunderson, Julie E. Rej, A. Nayelli Rivera-Villanueva, Pietro Pollo, Samantha Burke, Szymon M. Drobniak, and Shinichi Nakagawa"
  journal: "Nature"
  published: "March 5, 2025"
  citation: "Nature 639: 954-961"
  doi: "10.1038/s41586-025-08665-0"
  url: "https://www.nature.com/articles/s41586-025-08665-0"
  image: "https://media.springernature.com/lw685/springer-static/image/art%3A10.1038%2Fs41586-025-08665-0/MediaObjects/41586_2025_8665_Fig1_HTML.png"
  image_alt: "Global species-richness comparison figure from the amphibian warming vulnerability paper"
  summary: "Using phylogenetically informed imputation and microclimate-explicit modelling, this study shows that amphibian overheating risk rises sharply under warming and highlights shade and water as critical refuges."
