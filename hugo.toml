[params]
  author = "COSSEE Lab"
  defaultKeywords = ["COSSEE", "open science", "ecology", "evolution", "research synthesis"]
  mainSections = ["blog"]
  defaultDescription = "Collaboration for Open Science and Synthesis in Ecology and Evolution"
  facebook_site = ""
  twitter_site = ""
  default_sharing_image = "img/sharing-default.png"
  enableGoogleMaps = false
  googleMapsApiKey = ""
  latitude = "53.5232"
  longitude = "-113.5263"
  style = "default"
  formspree_action = ""
  contact_form_ajax = false
  enableRecaptchaInContactForm = false
  googleRecaptchaKey = ""
  about_us = "<p>COSSEE brings together open science, research synthesis, meta-research, and methodological innovation to improve ecology and evolution research.</p>"
  copyright = "Copyright (c) COSSEE Lab."
  date_format = "January 2, 2006"
  dropdown_mouse_over = false
  disabled_logo = false
  logo_text = "COSSEE"
  logo = "img/cossee-mahi1.svg"
  logo_small = "img/cossee-mahi1.svg"
  favicon = "img/cossee-mahi1.svg"
  apple_touch_icon = "img/cossee-mahi1.svg"
  contact_url = "/contact/"
  address = """<p class="text-uppercase"><strong>COSSEE Lab</strong>
      <br>University of Alberta
      <br>Edmonton, Alberta
      <br>Canada
      <br>
      <strong>Open Science and Synthesis in Ecology and Evolution</strong>
    </p>
    """

[params.topbar]
  enable = true
  text = """<p class="hidden-sm hidden-xs">COSSEE is based at the University of Alberta in Edmonton, Canada.</p>
    <p class="hidden-md hidden-lg"><a href="mailto:snakagaw@ualberta.ca" data-animate-hover="pulse"><i class="fas fa-envelope"></i></a></p>
    """

[params.widgets]
  categories = false
  tags = false
  search = false

[params.carouselHomepage]
  enable = true
  auto_play = true
  slide_speed = 2000
  pagination_speed = 1000

[params.features]
  enable = true
  cols = 3

[params.testimonials]
  enable = true
  title = "Featured Publications"
  subtitle = "Recent 2025 papers connected to the COSSEE research program, spanning global-change ecology, amphibian databases, and methodological advances in synthesis research."
  scholar_url = "https://scholar.google.com/citations?user=9-pCZzcAAAAJ&hl=en"

[params.see_more]
  enable = true
  icon = "fas fa-seedling"
  title = "Want to Work With COSSEE?"
  subtitle = "Explore research opportunities, training expectations, and the collaborative culture behind the lab."
  link_url = "/opportunities/"
  link_text = "View Opportunities"

[params.clients]
  enable = false

[params.recent_posts]
  enable = false
  title = ""
  subtitle = ""
  hide_summary = true

[params.footer.recent_posts]
  enable = false

[taxonomies]
  category = "categories"
  tag = "tags"
  author = "authors"

[markup]
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true
